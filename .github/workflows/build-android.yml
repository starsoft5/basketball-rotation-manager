name: Build Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Android AAB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build AAB
        run: eas build --platform android --profile production --local --non-interactive --output ./basketball-rotation.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: basketball-rotation-aab
          path: ./basketball-rotation.aab
