<svg width="1080" height="2160" viewBox="0 0 1080 2160" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="0.5" stop-color="#0E1626"/>
      <stop offset="1" stop-color="#0A0F1A"/>
    </linearGradient>
    <linearGradient id="headerG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15233E"/>
      <stop offset="1" stop-color="#0E1626"/>
    </linearGradient>
    <linearGradient id="home" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FB923C"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="away" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <!-- ring: green->orange portion, ~62% elapsed so colour sits in orange band -->
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="progress" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000000" flood-opacity="0.40"/>
    </filter>
  </defs>

  <rect width="1080" height="2160" fill="url(#bg)"/>

  <!-- ====================== STATUS BAR ====================== -->
  <g fill="#E7EEFB">
    <text x="56" y="74" font-size="32" font-weight="700">9:41</text>
