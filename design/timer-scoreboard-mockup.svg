    <text x="540" y="162" fill="#7E90AE" font-size="24" font-weight="700" text-anchor="middle" letter-spacing="3">TIMER</text>
    <text x="540" y="200" fill="#F4F8FF" font-size="40" font-weight="800" text-anchor="middle">Saturday Run</text>
    <circle cx="1002" cy="171" r="40" fill="#1B2942"/>
