      <rect x="306" y="1846" width="210" height="64" rx="16" fill="#0F1A30"/>
      <text x="411" y="1886" fill="#DCE6F5" text-anchor="middle">#8 Mike</text>
      <rect x="532" y="1846" width="210" height="64" rx="16" fill="#0F1A30"/>
      <text x="637" y="1886" fill="#DCE6F5" text-anchor="middle">#2 Ron</text>
      <rect x="758" y="1846" width="210" height="64" rx="16" fill="#102a3a"/>
      <text x="863" y="1886" fill="#7FD7F5" text-anchor="middle">#6 Tom ⇄</text>

      <rect x="80" y="1928" width="210" height="64" rx="16" fill="#0F1A30"/>
      <text x="185" y="1968" fill="#DCE6F5" text-anchor="middle">#10 Sam</text>
      <rect x="306" y="1928" width="210" height="64" rx="16" fill="#0F1A30"/>
      <text x="411" y="1968" fill="#DCE6F5" text-anchor="middle">#1 Andy</text>
      <rect x="532" y="1928" width="210" height="64" rx="16" fill="#0F1A30"/>
      <text x="637" y="1968" fill="#DCE6F5" text-anchor="middle">#12 Vic</text>
      <rect x="758" y="1928" width="210" height="64" rx="16" fill="#0F1A30"/>
